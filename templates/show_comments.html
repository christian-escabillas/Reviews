{% extends "layout.html" %}

{% block content %}

<h1>Comments for {{ review_title }}</h1>
    <ul>
        {% for comment in comments %}
          <hr>
            <p>User: <a href="/profile/{{ comment.user_id }}">{{ comment.username }}</a></p>
            <p>{{ comment.comment }}</p>
              {% if session.get('user_id') == comment.user_id %}
                <a href="{{ url_for('edit_comment', comment_id=comment.id) }}">Edit</a>
                <form action="{{ url_for('delete_comment', comment_id=comment.id) }}" method="post" style="display:inline;">
                  <input type="hidden" name="csrf_token" value="{{ session.get('csrf_token') }}">
                  <button type="submit" onclick="return confirm('Delete this comment?');">Delete</button>
                </form>
              {% endif %}
          <hr>
          {% endfor %}
      </div>
    </ul>

{% endblock %}
