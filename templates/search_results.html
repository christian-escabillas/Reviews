<!DOCTYPE html>
<html>
<head>
  <title>Search Results</title>
</head>

<body>
  <h1>Search Results</h1>

  <p>
    Category: {{item_type or "-" }}
  </p>

  <p>
    Query: {{ query or "-" }}
  </p>

  {% if results %}
    <hr>

    {% for row in results %}
    <p>
      Item: {{ row.item_title }}<br>
      Type: {{ row.item_type }}<br>
      <a href="/review/{{ row.review_id }}">Open review</a>

    </p>
    <hr>
    {% endfor %}

    {% else %}
    <p>
      No results
    </p>
    {% endif %}

    <p>
      <a href="/find_item">Back to search</a> |
      <a href="/">Home</a>
    </p>
</body>
</html>
