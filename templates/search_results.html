{% extends "layout.html" %}

{% block content %}

<div class="home-page">

  <h1>Search Results</h1>

  <form action="/search" method="get">
    <input type="hidden" name="q" value="{{ query|e }}">

    <label>
      Sort by category:
      <select name="item_type">
        <option value="all" {% if item_type == "all" %}selected{% endif %}>All</option>
        <option value="movie" {% if item_type == "movie" %}selected{% endif %}>Movie</option>
        <option value="series" {% if item_type == "series" %}selected{% endif %}>Series</option>
        <option value="game" {% if item_type == "game" %}selected{% endif %}>Game</option>
        <option value="song" {% if item_type == "song" %}selected{% endif %}>Song</option>
      </select>
    </label>

    <button type="submit" class="search-button">Apply</button>
  </form>

  {% if results %}

    {% for row in results %}
      <div class="review-card">

        <div class="review-header">
          <a class="review-title" href="/review/{{ row.review_id }}">{{ row.review_title }}</a>

          <p class="review-meta">
            Reviewed by <a href="/profile/{{ row.user_id }}">{{ row.review_username }}</a><br>
            {{ row.item_type|capitalize }}: {{ row.item_title }}
          </p>
        </div>

      </div>
    {% endfor %}

  {% else %}
    <p>No results</p>
  {% endif %}

</div>

{% endblock %}
