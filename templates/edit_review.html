{% extends "layout.html" %}

{% block content %}

<div class="edit-page">
  <div class="edit-card">
    <h1>Edit Review</h1>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

      <label>Review Title:</label>
      <input class="edit-input" type="text" name="title" value="{{ review.title }}">

      <label>Thoughts:</label>
      <textarea class="edit-textarea" name="thoughts">{{ review.thoughts }}</textarea>

      <label>Rating:</label>
      <input class="edit-rating" type="number" name="rating" value="{{ review.rating }}" min="1" max="5">

      <button class="edit-button" type="submit">Update Review</button>
    </form>
  </div>
</div>

{% endblock %}
