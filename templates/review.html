{% extends "layout.html" %}

{% block content %}

<h1>{{ review.title }}</h1>

  <p>
    Item: {{ review.item_title }}
  </p>

  <p>
    Created by {{ review.username }}
  </p>

  <p>
    Rating: {{ review.rating }}
  </p>

  <p>
    {{ review.thoughts }}
  </p>

  {% if session.user_id == review.user_id %}
    <a href="/edit_review/{{ review.id }}">Edit Review</a><br>
    <hr>
    <form action="{{ url_for('delete_review', review_id=review.id) }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ session['csrf_token'] }}">
      <input type="submit" value="Delete Review" onclick="return confirm('Are you sure you want to delete this review permanently?');">
    </form>
  {% endif %}

{% endblock %}
