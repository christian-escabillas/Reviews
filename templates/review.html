{% extends "layout.html" %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
  <title>{{ review.title }}</title>
</head>
<body>
  <h1>{{ review.title }}</h1>

  <p>
    Item: {{ review.item_title }}
  </p>

  <p>
    Created by {{ review.username }}
  </p>

  <p>
    Rating: {{ review.rating }}
  </p>

  <p>
    {{ review.thoughts }}
  </p>

  {% if session.user_id == review.user_id %}
    <a href="/edit_review/{{ review.id }}">Edit Review</a><br>
    <hr>
    <form action="/delete_review/{{ review.id }}" method="post" style="display:inline;">
      <input type="submit" value="Delete Review" onclick="return confirm('Are you sure you want to delete this review?');">
    </form>
  {% endif %}

</body>
</html>
{% endblock %}
