{% extends "layout.html" %}

{% block content %}

<style>
  .categories {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
  }

  .category-box {
    width: 200px;
    height: 120px;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: white;
    font-size: 20px;
    font-weight: bold;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
  }

  .movie {
    background-image: url("/static/movie.png");
  }

  .series {
    background-image: url("/static/movie.png");
  }

  .game {
    background-image: url("/static/movie.png");
  }

  .song {
    background-image: url("/static/movie.png");
  }
</style>

<!DOCTYPE html>
<html>
<head>
  <title>New Review</title>
</head>
<body>
  <h1>Choose a category</h1>

  <div class="categories">
    <a href="/new_review/movie" class="category-box">Movie</a>
    <a href="/new_review/game" class="category-box">Game</a>
    <a href="/new_review/series" class="category-box">Series</a>
    <a href="/new_review/song" class="category-box">Song</a>
  </div>

</body>
</html>
{% endblock %}
