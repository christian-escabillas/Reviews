<!DOCTYPE html>
<html>
<head>
  <title>New Review</title>
  <style>
    .category-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .category-box {
      width: 180px;
      height: 120px;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: black;
      font-size: 24px;
      font-weight: bold;
      border-radius: 10px;
    }

    .category-box:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Choose a category</h1>

  <div class="category-container">
    <a href="/new_review/movie" class="category-box">Movie</a>
    <a href="/new_review/game" class="category-box">Game</a>
    <a href="/new_review/book" class="category-box">Book</a>
    <a href="/new_review/music" class="category-box">Music</a>
  </div>
</body>
</html>
